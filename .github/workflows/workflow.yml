name: Yeet into DO
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Install doctl
      uses: digitalocean/action-doctl@v2
      with:
        token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

    - name: Build container image
      run: docker build -t ${{ secrets.REGISTRY_NAME }}/content-server:$(echo $GITHUB_SHA | head -c7) -t ${{ secrets.REGISTRY_NAME }}/content-server:latest .

    - name: Log in to DigitalOcean Container Registry with short-lived credentials
      run: doctl registry login --expiry-seconds 1200

    - name: Push image to DigitalOcean Container Registry
      run: docker push ${{ secrets.REGISTRY_NAME }}/content-server:$(echo $GITHUB_SHA | head -c7)

    - name: Trigger deployment on droplet
      env:
        DROPLET_ID: ${{ secrets.DROPLET_ID }}
        SSH_KEY: ${{ secrets.SSH_KEY }}
      run: |
        DropletIP=$(doctl compute droplet get $DROPLET_ID --format PublicIPv4 --no-header)
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        ssh-keyscan -H $DropletIP >> ~/.ssh/known_hosts 2>/dev/null

        echo "$SSH_KEY" > $GITHUB_WORKSPACE/deploy_key
        chmod 600 $GITHUB_WORKSPACE/deploy_key
        export SSH_OPTS="-o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null"
        doctl compute ssh $DROPLET_ID --ssh-user deployer --ssh-key-path $GITHUB_WORKSPACE/deploy_key --ssh-command "/home/deployer/deploy.sh"
        rm $GITHUB_WORKSPACE/deploy_key
        unset SSH_OPTs
